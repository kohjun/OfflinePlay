# ---------------------------------------------------------------
# ContENIDO 공통 설정 (모든 프로파일에서 로드됨)
#
# 실행 방법:
#   로컬 개발 : ./gradlew bootRun  (spring.profiles.active=local 기본 적용)
#   운영 배포 : java -jar app.jar -Dspring.profiles.active=prod
# ---------------------------------------------------------------

spring:
  profiles:
    active: local   # 기본 프로파일 — 운영 배포 시 prod로 오버라이드할 것
  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:ZnJvbS1jb250ZW5pZG8tc2VjcmV0LWtleS1tdXN0LWJlLWF0LWxlYXN0LTI1Ni1iaXRzLWxvbmcx}
  access-token-expiration: 1800000      # 30분 (ms)
  refresh-token-expiration: 1209600000  # 14일 (ms)

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.contenido: DEBUG
    org.springframework.security: INFO
